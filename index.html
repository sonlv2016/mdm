<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>通行凭证</title>

<!-- Icon khi lưu Shortcut trên iPhone -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<!-- Hiển thị giống app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="通行凭证">

<style>
:root{
    --yellow:#e5bc47;
    --text:#f0dfc8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
    font-family:-apple-system,BlinkMacSystemFont,
        "Segoe UI",Roboto,Arial,sans-serif;

    /* Ảnh nền trong cùng thư mục */
    background:
        url("background.jpg")
        center center / cover
        no-repeat fixed;

    color:var(--text);
    overflow-x:hidden;
}

/* Lớp phủ tối */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    pointer-events:none;
}

.wrap{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:70px 15px 100px;
    position:relative;
    z-index:1;
}

.header-id{
    text-align:center;
    font-size:18px;
    margin-bottom:24px;
    color:#f6ead6;
    font-weight:500;
    letter-spacing:.3px;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
}

.card{
    width:82%;
    margin:auto;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.45);
}

.card-top{
    height:72px;
    background:var(--yellow);
    color:#fff4dc;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-size:16px;
    text-align:center;
    padding:0 20px;
}

.card-top::before,
.card-top::after{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    background:rgba(0,0,0,.45);
    border-radius:50%;
    bottom:-9px;
}

.card-top::before{
    left:-9px;
}

.card-top::after{
    right:-9px;
}

.card-body{
    padding:22px 20px 30px;
    text-align:center;
}

#timeText{
    font-size:16px;
    color:#111;
    margin-bottom:10px;
}

#qrcode{
    width:247px;
    height:247px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:opacity .25s ease;
}

#qrcode img{
    width:247px !important;
    height:247px !important;
    display:block;
    image-rendering:pixelated;
}

.refresh{
    margin-top:14px;
    color:#8c8c8c;
    font-size:16px;
}

.footer-note{
    width:82%;
    margin:50px auto 0;
    font-size:15px;
    line-height:1.75;
    color:#f3e4d1;
    text-align:left;
    text-indent:2em;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
}
</style>
</head>

<body>

<div class="wrap">

    <div class="header-id">
        V24060016(Lê Văn Sơn)
    </div>

    <div class="card">

        <div class="card-top">
            将二维码对准扫描器刷码出场
        </div>

        <div class="card-body">

            <div id="timeText"></div>

            <div id="qrcode"></div>

            <div class="refresh">
                刷新二维码
            </div>

        </div>

    </div>

    <div class="footer-note">
        尊敬的员工您好，您已进入企业涉密区域，
        出于企业安全考虑，您的手机摄像头将被禁止拍摄，
        感谢您的配合。
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<script>
function updateTime(){

    const now = new Date();

    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');

    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("timeText").innerText =
        `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}

function createQR(){

    const container =
        document.getElementById("qrcode");

    container.style.opacity = "0";

    setTimeout(()=>{

        container.innerHTML = "";

        const text =
            Date.now() + "|" +
            crypto.randomUUID() + "|" +
            Math.random().toString(36).repeat(5);

        const qr = qrcode(15,'H');

        qr.addData(text);
        qr.make();

        container.innerHTML =
            qr.createImgTag(4,0);

        const img =
            container.querySelector("img");

        img.style.width = "247px";
        img.style.height = "247px";
        img.style.imageRendering = "pixelated";

        container.style.opacity = "1";

    },150);
}

updateTime();
setInterval(updateTime,1000);

createQR();
setInterval(createQR,15000);
</script>

</body>
</html>
