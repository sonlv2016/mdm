<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>通行凭证 - Replica</title>

<!-- iOS Home Screen full screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- iOS Home Screen icon (ảnh trong cùng thư mục) -->
<link rel="apple-touch-icon" href="icon.png">

<style>
:root{
  --bg:#2b2d3a;
  --card:#ffffff;
  --accent:#ffdb4d;
  --muted:#bfb7a9;
  --green:#1fb954;
  --text:#e7d7c7;
  --dark:#22212a;
}
html,body{
  height:100%;
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background: url("bg.jpg") no-repeat center center fixed;
  background-size: cover;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.wrap{
  max-width:420px;
  margin:30px auto;
  padding:20px 12px 60px;
  box-sizing:border-box;
  position:relative;
  min-height:700px;
}
.header-id{
  text-align:center;
  color:#f1e2ca;
  font-size:18px;
  margin-top:6px;
  font-weight:500;
}
.card{
  width:80%;
  margin:24px auto 16px;
  background:var(--card);
  border-radius:8px;
  box-shadow:0 6px 30px rgba(0,0,0,0.45);
  overflow:visible;
  position:relative;
}
.card .top-strip{
  background:var(--accent);
  height:64px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:14px;
  letter-spacing:0.6px;
}
.card .top-strip::before,.card .top-strip::after{
  content:"";
  position:absolute;
  width:12px;height:12px;
  background:var(--accent);
  transform:translateY(24px);
  border-radius:50%;
  z-index:2;
}
.card .top-strip::before{left:8px;}
.card .top-strip::after{right:8px;}
.card .body{
  padding:20px 28px 30px; 
  text-align:center;
}
.timestamp-top{
  color:#4b4b4b;
  font-size:16px;
  margin-bottom:18px;
  font-weight:500;
}
.check-wrap{
  width:88px;
  height:88px;
  margin:6px auto 18px;
  background:var(--accent);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 20px rgba(255,219,77,0.25);
}
.check-wrap svg{width:66px;height:66px;}
.success-title,
.success-sub,
.refresh-qr{
  color:#4b4b4b;
  font-weight:500;
}
.success-title{
  font-size:20px;
  margin-top:6px;
}
.success-sub{
  font-size:14px;
  margin-top:8px;
}
.refresh-qr{
  margin-top:38px;
  font-size:13px;
}
.active-block{
  margin-top:20px;
  font-size:18px;
  font-weight:600;
  line-height:1;
}
.active-block .blink-text{
  color:var(--green);
  animation:fadePulse 2s infinite;
  font-weight:400;
}
@keyframes fadePulse{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}
.active-timer{
  display:block;
  color:var(--green);
  font-size:16px;
  font-weight:400;
  margin-top:4px;
}
.footer-note{
  margin:24px auto 0;
  max-width:80%;
  color:#d7c6b4;
  font-size:14px;
  line-height:1.7;
  text-align:left;
padding:12px 16px;
  border-radius:6px;
  opacity:0.95;
}
.footer-note p:first-child{
  text-indent:32px;
  margin:0;
}
.footer-note p:last-child{
  margin:0;
}
.bottom-graphic{
  margin-top:40px;
  opacity:0.08;
  display:block;
  width:100%;
  height:160px;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,0.02),transparent 10%),
    radial-gradient(circle at 80% 80%,rgba(255,255,255,0.02),transparent 10%);
}
@media (min-width:760px){
  .wrap{max-width:420px;}
}
</style>
</head>
<body>
<div class="wrap" role="main">
  <div class="header-id">V24090016(<span style="font-weight:600;color:#f9f1e2">Lê Văn Sơn</span>)</div>
  <div class="card" aria-labelledby="cardTitle">
    <div class="top-strip">您的设备已符合安全规范</div>
    <div class="body">
      <div class="timestamp-top" id="timestamp"></div>
      <div class="check-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="12" fill="none"/>
          <path d="M6.5 12.5l3.2 3.2 7.8-8.6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-title">进场成功</div>
      <div class="success-sub" id="subtime"></div>
      <div class="refresh-qr">刷新二维码</div>
      <div class="active-block">
        <span class="blink-text">已生效</span>
        <span class="active-timer" id="timer">02:00</span>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <p>尊敬的员工您好，您已进入企业涉密区域，</p>
    <p>出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。</p>
  </div>
  <div class="bottom-graphic" aria-hidden="true"></div>
</div>

<script>
function updateTime(){
  const now=new Date();
  const year=now.getFullYear();
  const month=String(now.getMonth()+1).padStart(2,'0');
  const day=String(now.getDate()).padStart(2,'0');
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById("timestamp").textContent=`${year}-${month}-${day}  ${h}:${m}:${s}`;
  document.getElementById("subtime").textContent=`${year}-${month}-${day} ${h}:${m}`;
}
setInterval(updateTime,1000);
updateTime();

// Bộ đếm tăng liên tục, bắt đầu từ 2:00
let totalSeconds=2*60;
function updateTimer(){
  totalSeconds++;
  let minutes=String(Math.floor(totalSeconds/60)).padStart(2,'0');
  let seconds=String(totalSeconds%60).padStart(2,'0');
  document.getElementById("timer").textContent=`${minutes}:${seconds}`;
}
setInterval(updateTimer,1000);
</script>
</body>
</html>
